name: Khula Collective CI/CD

on:
  push:
    branches: [main, master]
    paths-ignore: ['**.md', '.gitignore', '.dockerignore']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: |
          pip install flake8 bandit
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics
          bandit -r app.py -f json -o bandit-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan
          path: bandit-report.json
          retention-days: 30

  test:
    name: Test Startup
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: |
          pip install -r requirements.txt
          timeout 30 streamlit run app.py --server.headless true --server.port 8501 &
          sleep 15
          curl -f http://localhost:8501/_stcore/health || exit 1

  deploy-status:
    name: Deploy Status
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## ${status} Khula Collective CI/CD\n\n**Lint:** ${{ needs.lint.result }}\n**Test:** ${{ needs.test.result }}\n\n${status === '✅' ? '🚀 Ready to deploy!' : '⚠️ Checks failed.'}`
            });
